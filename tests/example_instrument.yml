api_version: "1.0.0"
instrument:
  vendor: Acme
  model: OSC1000
  identifier: SCOPE1
protocol:
  type: VISA
io:
  - name: rate
    type: float
    description: Global sample rate
  - name: mode
    type: string
    description: System mode
channel_groups:
  - name: analog
    count: 2
    description: Analog input channels
    channel_parameter:
      name: channel
      type: int
      min: 1
      max: 2
      description: Channel index (1-based)
    io_types:
      - suffix: waveform
        type: array
        role: output
        description: Acquired waveform
      - suffix: sample_rate
        type: float
        role: setting
        description: Per-channel sample rate
commands:
  SET_SAMPLE_RATE:
    template: "SOUR{analog}:SETSAMPLERATE {sample_rate}"
    description: Set the sample rate for a channel
    channel_group: analog
    parameters:
      - name: sample_rate
        type: float
        min: 1
        max: 125000000
        precision: 0.1
        description: Sample rate in Hz
    outputs: []
  SET_GAIN:
    template: "SOUR{analog}:SETGAIN {gain}"
    description: Set the gain code for a channel
    channel_group: analog
    parameters:
      - name: gain
        type: int
        min: 0
        max: 1023
        precision: 2
        description: Gain code (integer)
    outputs: []
  SET_MODE:
    template: "SYST:MODE {mode}"
    description: Set system mode
    parameters:
      - io: mode
    outputs: []
  MEASURE_WAVEFORM:
    template: "SOUR{analog}:MEASURE"
    description: Measures the waveform on the instrument
    channel_group: analog
    parameters: []
    outputs: [waveform]
